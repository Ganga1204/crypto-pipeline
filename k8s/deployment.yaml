# k8s/deployment.yaml
# This tells Kubernetes: run 1 copy of our pipeline container

apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-pipeline
  labels:
    app: crypto-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-pipeline
  template:
    metadata:
      labels:
        app: crypto-pipeline
    spec:
      containers:
      - name: crypto-pipeline
        image: YOURUSERNAME/crypto-pipeline:v1.0
        imagePullPolicy: Always
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: secret-key
        - name: AWS_REGION
          value: "us-east-1"
        - name: S3_BUCKET_NAME
          value: "crypto-pipeline-pop"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

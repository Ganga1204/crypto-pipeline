# .github/workflows/deploy.yml
# This runs every time Jenkins pushes a new image (on push to main)

name: CD - Deploy to Kubernetes

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

    - name: Update deployment image
      run: |
        kubectl set image deployment/crypto-pipeline \
          crypto-pipeline=YOURUSERNAME/crypto-pipeline:latest

    - name: Wait for rollout
      run: kubectl rollout status deployment/crypto-pipeline

    - name: Verify pods are running
      run: kubectl get pods
